name: Päivitä bensahinnat

on:
  schedule:
    # DEBUG: ajaa joka minuutti
    # Kun debuggaus on valmis, vaihda takaisin: "0 7 * * *"
    - cron: "*/10 * * * *"
  workflow_dispatch:  # Voit myös ajaa käsin GitHubissa

permissions:
  contents: write  # Tarvitaan data.json committaamiseen

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asenna riippuvuudet
        run: pip install requests beautifulsoup4

      - name: Aja scraper
        run: python scrape.py

      - name: Commitoi ja pushaa data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto: päivitä bensahinnat $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
